<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Manager | مدير العقارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.15);
    --text: #1a1a18;
    --text-sec: #6b6a63;
    --text-ter: #9b9a93;
    --accent: #2563a8;
    --accent-light: #e8f0fb;
    --green: #2d7a4f;
    --green-light: #e6f4ec;
    --amber: #92580a;
    --amber-light: #fdf3e3;
    --red: #b91c1c;
    --red-light: #fef2f2;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }
  [data-theme="dark"] {
    --bg: #111110;
    --surface: #1c1c1a;
    --surface2: #252522;
    --border: rgba(255,255,255,0.08);
    --border-md: rgba(255,255,255,0.14);
    --text: #f0efea;
    --text-sec: #9b9a93;
    --text-ter: #6b6a63;
    --accent: #4a85d4;
    --accent-light: #1a2a3f;
    --green: #4ade80;
    --green-light: #0d2a1a;
    --amber: #fbbf24;
    --amber-light: #2a1f0a;
    --red: #f87171;
    --red-light: #2a0e0e;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: 'Inter', 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  [dir="rtl"] body { font-family: 'Tajawal', 'Inter', sans-serif; }

  /* Layout */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 50;
    transition: transform .2s;
  }
  [dir="rtl"] .sidebar { left: auto; right: 0; border-right: none; border-left: 1px solid var(--border); }
  .main { margin-left: 220px; min-height: 100vh; }
  [dir="rtl"] .main { margin-left: 0; margin-right: 220px; }

  .sidebar-logo {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-mark {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px; margin-bottom: 8px;
  }
  .sidebar-logo .app-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .sidebar-logo .app-sub { font-size: 11px; color: var(--text-ter); margin-top: 1px; }

  .nav { padding: .75rem .75rem; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: var(--radius);
    font-size: 13.5px; color: var(--text-sec);
    cursor: pointer; margin-bottom: 2px;
    transition: background .12s, color .12s;
    border: none; background: none; width: 100%; text-align: left;
  }
  [dir="rtl"] .nav-item { text-align: right; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .nav-item i { font-size: 17px; flex-shrink: 0; }

  .sidebar-footer {
    padding: .75rem;
    border-top: 1px solid var(--border);
    display: flex; gap: 6px;
  }
  .icon-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 7px; border-radius: var(--radius); border: 1px solid var(--border);
    background: none; color: var(--text-sec); cursor: pointer; font-size: 16px;
    transition: background .12s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .lang-toggle {
    flex: 1; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 7px; border-radius: var(--radius); border: 1px solid var(--border);
    background: none; color: var(--text-sec); cursor: pointer;
    transition: background .12s;
  }
  .lang-toggle:hover { background: var(--surface2); color: var(--text); }

  /* Header */
  .page-header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: var(--surface);
    position: sticky; top: 0; z-index: 40;
  }
  .page-title { font-size: 18px; font-weight: 600; }
  .page-sub { font-size: 12px; color: var(--text-ter); margin-top: 2px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border-md);
    background: var(--surface); color: var(--text);
    transition: background .12s, box-shadow .12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); box-shadow: var(--shadow); }
  .btn-primary {
    background: var(--accent); color: #fff; border-color: transparent;
  }
  .btn-primary:hover { background: #1e52a0; box-shadow: var(--shadow-md); }
  .btn-danger { border-color: var(--red); color: var(--red); background: var(--red-light); }
  .btn-danger:hover { background: #fee2e2; }

  /* Content */
  .page-content { padding: 1.5rem 2rem; }

  /* Metrics */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 1.5rem;
  }
  .metric-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border); padding: 1.1rem 1.25rem;
    box-shadow: var(--shadow);
  }
  .metric-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; margin-bottom: 10px;
  }
  .metric-label { font-size: 11.5px; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .metric-value { font-size: 24px; font-weight: 600; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--text-ter); margin-top: 3px; }

  /* Toolbar */
  .toolbar {
    display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center;
  }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border-md);
    border-radius: var(--radius); padding: 7px 12px; flex: 1; min-width: 200px;
  }
  .search-box i { color: var(--text-ter); font-size: 16px; }
  .search-box input {
    border: none; background: none; color: var(--text); font-size: 13px; outline: none; width: 100%;
  }
  .search-box input::placeholder { color: var(--text-ter); }
  .filter-select {
    font-size: 13px; padding: 7px 12px;
    border-radius: var(--radius); border: 1px solid var(--border-md);
    background: var(--surface); color: var(--text); cursor: pointer; outline: none;
  }

  /* Units Grid */
  .units-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .unit-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border); padding: 1.1rem 1.25rem;
    cursor: pointer; box-shadow: var(--shadow);
    transition: border-color .15s, box-shadow .15s, transform .1s;
  }
  .unit-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .unit-card.overdue { border-left: 3px solid var(--red); }
  [dir="rtl"] .unit-card.overdue { border-left: none; border-right: 3px solid var(--red); }

  .card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
  .card-name { font-size: 14.5px; font-weight: 600; color: var(--text); }
  .card-meta { font-size: 12px; color: var(--text-sec); margin-top: 2px; }

  .badge {
    font-size: 11px; font-weight: 500; padding: 3px 9px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .badge-rented { background: var(--green-light); color: var(--green); }
  .badge-available { background: var(--accent-light); color: var(--accent); }
  .badge-resale { background: var(--amber-light); color: var(--amber); }
  .badge-overdue { background: var(--red-light); color: var(--red); }

  .card-rows { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .card-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; }
  .card-row .lbl { color: var(--text-sec); }
  .card-row .val { font-weight: 500; color: var(--text); }
  .card-row .val.warn { color: var(--amber); }
  .card-row .val.danger { color: var(--red); }

  .prog-wrap { margin-top: 8px; }
  .prog-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-ter); margin-bottom: 4px; }
  .prog-bar { height: 5px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s; }
  .prog-fill.warn { background: var(--amber); }
  .prog-fill.danger { background: var(--red); }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 200; padding: 2rem 1rem; overflow-y: auto;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border); width: 100%; max-width: 560px;
    box-shadow: var(--shadow-md); margin: auto;
  }
  .modal-head {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h2 { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 1.5rem; }
  .modal-foot {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  /* Form */
  .field-group { margin-bottom: 1rem; }
  .field-group label { display: block; font-size: 12px; color: var(--text-sec); margin-bottom: 5px; font-weight: 500; }
  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%; font-size: 13.5px; padding: 8px 12px;
    border-radius: var(--radius); border: 1px solid var(--border-md);
    background: var(--surface); color: var(--text); outline: none;
    transition: border-color .12s;
    font-family: inherit;
  }
  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus { border-color: var(--accent); }
  .field-group textarea { resize: vertical; min-height: 64px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .section-divider {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em;
    color: var(--text-ter); margin: 1.25rem 0 .75rem;
    padding-bottom: .5rem; border-bottom: 1px solid var(--border);
  }
  .checkbox-label {
    display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13.5px; color: var(--text);
  }
  .checkbox-label input { width: auto; }

  /* Detail modal */
  .detail-section { margin-bottom: 1.5rem; }
  .detail-section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em;
    color: var(--text-ter); margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .detail-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; padding: 5px 0;
  }
  .detail-row .dk { color: var(--text-sec); }
  .detail-row .dv { font-weight: 500; color: var(--text); text-align: right; }
  .detail-row .dv.danger { color: var(--red); }
  .detail-row .dv.warn { color: var(--amber); }
  .detail-row .dv.good { color: var(--green); }

  .install-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr)); gap: 6px; margin-top: 10px;
  }
  .install-pill {
    border-radius: 6px; padding: 4px 4px;
    font-size: 10px; font-weight: 600; text-align: center;
  }
  .install-pill.paid { background: var(--green-light); color: var(--green); }
  .install-pill.due { background: var(--surface2); color: var(--text-sec); }
  .install-pill.late { background: var(--red-light); color: var(--red); }
  .install-pill.next { background: var(--amber-light); color: var(--amber); }

  /* Upcoming */
  .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
  .upcoming-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 12px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; box-shadow: var(--shadow);
    transition: border-color .12s;
  }
  .upcoming-item:hover { border-color: var(--border-md); }
  .upcoming-item.urgent { border-color: var(--red); }
  .upcoming-item.warn { border-color: var(--amber); }
  .upcoming-icon {
    width: 36px; height: 36px; border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .upcoming-info { flex: 1; min-width: 0; }
  .upcoming-name { font-size: 13.5px; font-weight: 500; }
  .upcoming-type { font-size: 11.5px; color: var(--text-sec); margin-top: 1px; }
  .upcoming-right { text-align: right; flex-shrink: 0; }
  .upcoming-amt { font-size: 14px; font-weight: 600; }
  .upcoming-days { font-size: 11px; margin-top: 2px; }

  /* Reports */
  .reports-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px;
  }
  .report-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem; box-shadow: var(--shadow);
  }
  .report-card h3 { font-size: 13px; font-weight: 600; color: var(--text-sec); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .04em; }

  /* Empty */
  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--text-sec);
  }
  .empty-state i { font-size: 48px; color: var(--text-ter); margin-bottom: 12px; display: block; }
  .empty-state h3 { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* Mark paid button */
  .mark-paid-btn {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--green); color: var(--green);
    background: var(--green-light); cursor: pointer;
    font-weight: 500;
  }
  .mark-paid-btn:hover { opacity: .85; }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--text); color: var(--surface);
    padding: 10px 18px; border-radius: var(--radius);
    font-size: 13px; box-shadow: var(--shadow-md);
    z-index: 999; opacity: 0; transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  [dir="rtl"] .toast { right: auto; left: 1.5rem; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Responsive */
  @media (max-width: 720px) {
    .sidebar { transform: translateX(-100%); }
    [dir="rtl"] .sidebar { transform: translateX(100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0 !important; margin-right: 0 !important; }
    .page-content { padding: 1rem; }
    .page-header { padding: 1rem; }
    .field-row { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark"><i class="ti ti-building-estate"></i></div>
    <div class="app-name" id="app-name">Property Manager</div>
    <div class="app-sub" id="app-sub">Portfolio Dashboard</div>
  </div>
  <nav class="nav" id="nav">
    <button class="nav-item active" data-tab="units" onclick="setTab('units')">
      <i class="ti ti-building"></i><span data-t="units">Units</span>
    </button>
    <button class="nav-item" data-tab="upcoming" onclick="setTab('upcoming')">
      <i class="ti ti-calendar-due"></i><span data-t="upcoming">Upcoming</span>
    </button>
    <button class="nav-item" data-tab="reports" onclick="setTab('reports')">
      <i class="ti ti-chart-bar"></i><span data-t="reports">Reports</span>
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle dark mode"><i class="ti ti-moon" id="theme-icon"></i></button>
    <button class="lang-toggle" onclick="toggleLang()" id="lang-btn">عربي</button>
  </div>
</aside>

<!-- Main -->
<main class="main" id="main">
  <div class="page-header" id="page-header">
    <div>
      <div class="page-title" id="page-title">My Units</div>
      <div class="page-sub" id="page-sub-head"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-primary" id="add-btn" onclick="openAddModal()">
        <i class="ti ti-plus"></i><span data-t="addUnit">Add Unit</span>
      </button>
    </div>
  </div>
  <div class="page-content" id="page-content"></div>
</main>

<!-- Modal container -->
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>

let units = loadUnits();

// ─── TRANSLATIONS ─────────────────────────────────────────────────────────────
const T = {

function t(k) { return T[lang][k] || k; }

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(n) { return Number(n||0).toLocaleString(lang==='ar'?'ar-EG':'en-US'); }
function fmtDate(d) {
  if(!d) return '—';
  return new Date(d).toLocaleDateString(lang==='ar'?'ar-EG':'en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function daysUntil(dateStr) {
  if(!dateStr) return null;
  return Math.round((new Date(dateStr)-new Date())/(864e5));
}
function advanceDate(dateStr, period) {
  if(!dateStr) return dateStr;
  const d = new Date(dateStr);
  if(period==='monthly') d.setMonth(d.getMonth()+1);
  else if(period==='quarterly') d.setMonth(d.getMonth()+3);
  else if(period==='biannual') d.setMonth(d.getMonth()+6);
  else if(period==='annual') d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}
function statusBadge(s) {
  const map = {rented:'badge-rented',available:'badge-available',resale:'badge-resale'};
  return `<span class="badge ${map[s]||''}">${t(s)}</span>`;
}

// ─── THEME & LANG ─────────────────────────────────────────────────────────────
function toggleTheme() {
  theme = theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme', theme==='dark'?'dark':'');
  document.getElementById('theme-icon').className = theme==='dark'?'ti ti-sun':'ti ti-moon';
  localStorage.setItem('propman_theme', theme);
}
function toggleLang() {
  lang = lang==='en'?'ar':'en';
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', lang==='ar'?'rtl':'ltr');
  localStorage.setItem('propman_lang', lang);
  renderAll();
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab===tab);
  });
  renderPage();
}

// ─── RENDER ENGINE ────────────────────────────────────────────────────────────
function renderAll() {
  // Update text nodes
  document.getElementById('app-name').textContent = t('appName');
  document.getElementById('app-sub').textContent = t('appSub');
  document.querySelectorAll('[data-t]').forEach(el => {
    el.textContent = t(el.dataset.t);
  });
  document.getElementById('lang-btn').textContent = t('lang');
  document.querySelectorAll('.nav-item span').forEach(el => {
    el.textContent = t(el.dataset.t);
  });
  renderPage();
}

function renderPage() {
  const addBtn = document.getElementById('add-btn');
  if(addBtn) addBtn.style.display = activeTab==='units'?'':'none';

  const titles = {units: t('units'), upcoming: t('upcoming'), reports: t('reports')};
  document.getElementById('page-title').textContent = titles[activeTab];

  const subtitles = {
    units: `${units.length} ${t('totalUnits').toLowerCase()}`,
    upcoming: '',
    reports: ''
  };
  document.getElementById('page-sub-head').textContent = subtitles[activeTab]||'';

  const content = document.getElementById('page-content');
  if(activeTab==='units') content.innerHTML = renderUnits();
  else if(activeTab==='upcoming') content.innerHTML = renderUpcoming();
  else if(activeTab==='reports') content.innerHTML = renderReports();
}

// ─── METRICS ─────────────────────────────────────────────────────────────────
function renderMetrics() {
  const total = units.length;
  const rented = units.filter(u=>u.status==='rented').length;
  const avail = units.filter(u=>u.status==='available').length;
  const resale = units.filter(u=>u.status==='resale').length;
  const totalVal = units.reduce((a,u)=>a+(+u.currentValue||0),0);
  const metrics = [
    {icon:'ti-building', color:'#2563a8', bg:'#e8f0fb', label:t('totalUnits'), val:total},
    {icon:'ti-home-check', color:'#2d7a4f', bg:'#e6f4ec', label:t('rentedUnits'), val:rented},
    {icon:'ti-door-enter', color:'#92580a', bg:'#fdf3e3', label:t('availUnits'), val:avail},
    {icon:'ti-tag', color:'#7c3aed', bg:'#f0ebfe', label:t('resaleUnits'), val:resale},
    {icon:'ti-coins', color:'#0e7490', bg:'#e0f7fa', label:t('portfolioValue'), val:fmt(totalVal)+' EGP', isText:true},
  ];
  return `<div class="metrics-grid">${metrics.map(m=>`
    <div class="metric-card">
      <div class="metric-icon" style="background:${m.bg};color:${m.color}"><i class="ti ${m.icon}"></i></div>
      <div class="metric-label">${m.label}</div>
      <div class="metric-value" style="font-size:${m.isText?'16px':'24px'}">${m.val}</div>
    </div>`).join('')}
  </div>`;
}

// ─── UNITS TAB ────────────────────────────────────────────────────────────────
function renderUnits() {
  const filtered = units.filter(u => {
    if(filterStatus!=='all' && u.status!==filterStatus) return false;
    if(searchQ && !u.name.toLowerCase().includes(searchQ.toLowerCase()) && !(u.project||'').toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });

  const toolbar = `<div class="toolbar">
    <div class="search-box">
      <i class="ti ti-search"></i>
      <input type="text" placeholder="${t('search')}" value="${searchQ.replace(/"/g,'&quot;')}" oninput="searchQ=this.value;renderPage()" />
    </div>
    <select class="filter-select" onchange="filterStatus=this.value;renderPage()">
      <option value="all"${filterStatus==='all'?' selected':''}>${t('filterAll')}</option>
      <option value="rented"${filterStatus==='rented'?' selected':''}>${t('rented')}</option>
      <option value="available"${filterStatus==='available'?' selected':''}>${t('available')}</option>
      <option value="resale"${filterStatus==='resale'?' selected':''}>${t('resale')}</option>
    </select>
  </div>`;

  if(filtered.length===0) return renderMetrics()+toolbar+`
    <div class="empty-state">
      <i class="ti ti-building-off"></i>
      <h3>${t('noUnits')}</h3>
      <p>${t('noUnitsHint')}</p>
    </div>`;

  const cards = filtered.map(u => {
    const installDays = u.hasInstall&&u.nextInstall ? daysUntil(u.nextInstall) : null;
    const rentDays = u.status==='rented'&&u.nextCollection ? daysUntil(u.nextCollection) : null;
    const isOverdue = (installDays!==null&&installDays<0)||(rentDays!==null&&rentDays<0);
    const pct = u.totalInstalls>0 ? Math.round(u.paidInstalls/u.totalInstalls*100) : 0;
    const progClass = pct<30?'danger':pct<60?'warn':'';

    let rows = '';
    if(u.status==='rented') {
      rows += `<div class="card-row"><span class="lbl">${t('tenantName')}</span><span class="val">${u.tenantName||'—'}</span></div>`;
      rows += `<div class="card-row"><span class="lbl">${t('rentAmt')}</span><span class="val">${fmt(u.rentAmt)} EGP</span></div>`;
      if(rentDays!==null) {
        const cls = rentDays<0?'danger':rentDays<=7?'warn':'';
        const txt = rentDays<0?`${Math.abs(rentDays)} ${t('daysOverdue')}`:rentDays===0?t('today'):`${fmtDate(u.nextCollection)}`;
        rows += `<div class="card-row"><span class="lbl">${t('nextCollection')}</span><span class="val ${cls}">${txt}</span></div>`;
      }
    }
    if(u.hasInstall) {
      const cls = installDays!==null&&installDays<0?'danger':installDays!==null&&installDays<=7?'warn':'';
      rows += `<div class="card-row"><span class="lbl">${t('nextInstall')}</span><span class="val ${cls}">${fmtDate(u.nextInstall)}</span></div>`;
    }

    let prog = '';
    if(u.hasInstall&&u.totalInstalls>0) {
      prog = `<div class="prog-wrap">
        <div class="prog-label"><span>${u.paidInstalls} ${t('of')} ${u.totalInstalls} ${t('progress')}</span><span>${pct}%</span></div>
        <div class="prog-bar"><div class="prog-fill ${progClass}" style="width:${pct}%"></div></div>
      </div>`;
    }

    return `<div class="unit-card${isOverdue?' overdue':''}" onclick="openUnitDetail(${u.id})">
      <div class="card-head">
        <div>
          <div class="card-name">${u.name}</div>
          <div class="card-meta">${u.project||''} · ${u.area} m²</div>
        </div>
        ${statusBadge(u.status)}
      </div>
      <div class="card-rows">${rows}</div>
      ${prog}
    </div>`;
  }).join('');

  return renderMetrics()+toolbar+`<div class="units-grid">${cards}</div>`;
}

// ─── UPCOMING TAB ─────────────────────────────────────────────────────────────
function renderUpcoming() {
  const items = [];
  units.forEach(u => {
    if(u.hasInstall&&u.nextInstall) {
      const d = daysUntil(u.nextInstall);
      items.push({type:'install',unit:u,days:d,date:u.nextInstall,amt:u.installAmt});
    }
    if(u.status==='rented'&&u.nextCollection) {
      const d = daysUntil(u.nextCollection);
      items.push({type:'rent',unit:u,days:d,date:u.nextCollection,amt:u.rentAmt});
    }
  });
  items.sort((a,b)=>a.days-b.days);

  if(items.length===0) return `<div class="empty-state"><i class="ti ti-calendar-off"></i><h3>${t('noUpcoming')}</h3></div>`;

  const html = items.map(item => {
    const urgent = item.days<0;
    const warn = !urgent&&item.days<=7;
    const dayCls = urgent?'danger':warn?'warn':'good';
    const dayTxt = item.days<0
      ? `${Math.abs(item.days)} ${t('daysOverdue')}`
      : item.days===0 ? t('today')
      : `${item.days} ${t('daysLeft')}`;
    const iconBg = item.type==='rent'
      ? 'background:#e6f4ec;color:#2d7a4f'
      : 'background:#e8f0fb;color:#2563a8';
    const icon = item.type==='rent'?'ti-home':'ti-credit-card';
    const typeLabel = item.type==='rent'?t('rentCollect'):t('installDue');

    return `<div class="upcoming-item${urgent?' urgent':warn?' warn':''}" onclick="openUnitDetail(${item.unit.id})">
      <div class="upcoming-icon" style="${iconBg}"><i class="ti ${icon}"></i></div>
      <div class="upcoming-info">
        <div class="upcoming-name">${item.unit.name}</div>
        <div class="upcoming-type">${typeLabel} · ${fmtDate(item.date)}</div>
      </div>
      <div class="upcoming-right">
        <div class="upcoming-amt">${fmt(item.amt)} EGP</div>
        <div class="upcoming-days" style="color:var(--${dayCls==='good'?'green':dayCls==='warn'?'amber':'red'})">${dayTxt}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="upcoming-list">${html}</div>`;
}

  const totalRent = units.filter(u=>u.status==='rented').reduce((a,u)=>a+(+u.rentAmt||0),0);

  const totalPurchase = units.reduce((a,u)=>a+(+u.purchasePrice||0),0);
  const totalCurrent = units.reduce((a,u)=>a+(+u.currentValue||0),0);

  const gainPct = totalPurchase>0 ? ((gain/totalPurchase)*100).toFixed(1) : 0;

  const topMetrics = `<div class="metrics-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">

// ─── UNIT DETAIL MODAL ────────────────────────────────────────────────────────
function openUnitDetail(id) {
  const u = units.find(x=>x.id===id); if(!u) return;
  const installDays = u.hasInstall&&u.nextInstall ? daysUntil(u.nextInstall) : null;
  const rentDays = u.status==='rented'&&u.nextCollection ? daysUntil(u.nextCollection) : null;
  const pct = u.totalInstalls>0 ? Math.round(u.paidInstalls/u.totalInstalls*100) : 0;

  let installGrid = '';
  if(u.hasInstall&&u.totalInstalls>0) {
    const pills = Array.from({length:Math.min(u.totalInstalls,24)},(_,i)=>{
      let cls = i<u.paidInstalls?'paid':'due';
      if(i===u.paidInstalls) cls='next';
      return `<div class="install-pill ${cls}">${i+1}</div>`;
    }).join('');
    installGrid = `<div class="install-grid">${pills}</div>`;
    if(u.totalInstalls>24) installGrid += `<div style="font-size:11px;color:var(--text-ter);margin-top:6px;text-align:center">Showing first 24 of ${u.totalInstalls}</div>`;
  }

  const body = `
    <div class="detail-section">
      <div class="detail-section-title">${t('unitInfo')}</div>
      <div class="detail-row"><span class="dk">${t('type')}</span><span class="dv">${t(u.type)}</span></div>
      <div class="detail-row"><span class="dk">${t('project')}</span><span class="dv">${u.project||'—'}</span></div>
      <div class="detail-row"><span class="dk">${t('area')}</span><span class="dv">${u.area} m²</span></div>
      <div class="detail-row"><span class="dk">${t('purchasePrice')}</span><span class="dv">${fmt(u.purchasePrice)} EGP</span></div>
      <div class="detail-row"><span class="dk">${t('currentValue')}</span><span class="dv">${fmt(u.currentValue)} EGP</span></div>
      ${u.purchasePrice&&u.currentValue?`<div class="detail-row"><span class="dk">Gain</span><span class="dv ${u.currentValue>=u.purchasePrice?'good':'danger'}">${u.currentValue>=u.purchasePrice?'+':''}${fmt(u.currentValue-u.purchasePrice)} EGP</span></div>`:''}
    </div>
    ${u.status==='rented'?`
    <div class="detail-section">
      <div class="detail-section-title">${t('rentDetails')}</div>
      <div class="detail-row"><span class="dk">${t('tenantName')}</span><span class="dv">${u.tenantName||'—'}</span></div>
      <div class="detail-row"><span class="dk">${t('tenantPhone')}</span><span class="dv">${u.tenantPhone||'—'}</span></div>
      <div class="detail-row"><span class="dk">${t('rentAmt')}</span><span class="dv">${fmt(u.rentAmt)} EGP</span></div>
      <div class="detail-row"><span class="dk">${t('rentPeriod')}</span><span class="dv">${t(u.rentPeriod)}</span></div>
      <div class="detail-row"><span class="dk">${t('rentStart')}</span><span class="dv">${fmtDate(u.rentStart)}</span></div>
      <div class="detail-row"><span class="dk">${t('nextCollection')}</span>
        <span class="dv ${rentDays!==null&&rentDays<0?'danger':rentDays!==null&&rentDays<=7?'warn':''}">${fmtDate(u.nextCollection)}
        ${rentDays!==null?` (${rentDays<0?Math.abs(rentDays)+' '+t('daysOverdue'):rentDays===0?t('today'):rentDays+' '+t('daysLeft')})`:''}</span>
      </div>
      <div class="detail-row"><span class="dk">${t('secDeposit')}</span><span class="dv">${fmt(u.secDeposit)} EGP</span></div>
      <div class="detail-row"><span class="dk">${t('rentDeposit')}</span><span class="dv">${u.rentDeposit} months = ${fmt(u.rentAmt*u.rentDeposit)} EGP</span></div>
      ${rentDays!==null&&rentDays<=7?`<div style="margin-top:10px"><button class="mark-paid-btn" onclick="markRentPaid(${u.id})"><i class="ti ti-check"></i> ${t('markPaid')}</button></div>`:''}
    </div>`:''}
    ${u.hasInstall?`
    <div class="detail-section">
      <div class="detail-section-title">${t('installments')}</div>
      <div class="detail-row"><span class="dk">${t('installAmt')}</span><span class="dv">${fmt(u.installAmt)} EGP</span></div>
      <div class="detail-row"><span class="dk">${t('installPeriod')}</span><span class="dv">${t(u.installPeriod)}</span></div>
      <div class="detail-row"><span class="dk">${t('nextInstall')}</span>
        <span class="dv ${installDays!==null&&installDays<0?'danger':installDays!==null&&installDays<=7?'warn':''}">${fmtDate(u.nextInstall)}
        ${installDays!==null?` (${installDays<0?Math.abs(installDays)+' '+t('daysOverdue'):installDays===0?t('today'):installDays+' '+t('daysLeft')})`:''}</span>
      </div>
      <div class="detail-row"><span class="dk">Remaining</span><span class="dv">${u.totalInstalls-u.paidInstalls} installments · ${fmt((u.totalInstalls-u.paidInstalls)*u.installAmt)} EGP</span></div>
      ${u.lateFee?`<div class="detail-row"><span class="dk">${t('lateFee')}</span><span class="dv">${u.lateFee}%${installDays!==null&&installDays<0?' → late fee: '+fmt(u.installAmt*u.lateFee/100)+' EGP':''}</span></div>`:''}
      <div style="margin-top:12px">
        <div class="prog-label"><span>${pct}%  · ${u.paidInstalls} ${t('of')} ${u.totalInstalls}</span></div>
        <div class="prog-bar" style="height:7px"><div class="prog-fill ${pct<40?'warn':''}" style="width:${pct}%"></div></div>
      </div>
      ${installGrid}
      ${installDays!==null&&installDays<=7?`<div style="margin-top:12px;display:flex;gap:8px">
        <button class="mark-paid-btn" onclick="markInstallPaid(${u.id})"><i class="ti ti-check"></i> ${t('markPaid')}</button>
        <button class="mark-paid-btn" style="background:var(--amber-light);color:var(--amber);border-color:var(--amber)" onclick="delayInstall(${u.id})"><i class="ti ti-clock"></i> ${t('delayPayment')}</button>
      </div>`:''}
    </div>`:''}
    ${u.notes?`<div class="detail-section"><div class="detail-section-title">Notes</div><p style="font-size:13px;color:var(--text-sec)">${u.notes}</p></div>`:''}
  `;

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:16px;font-weight:600">${u.name}</span>
            ${statusBadge(u.status)}
          </div>
          <button class="icon-btn" onclick="closeModal()" style="width:32px;height:32px"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">${body}</div>
        <div class="modal-foot">
          <button class="btn btn-danger" onclick="deleteUnit(${u.id})"><i class="ti ti-trash"></i>${t('deleteUnit')}</button>
          <button class="btn" onclick="openEditModal(${u.id})"><i class="ti ti-edit"></i>${t('editUnit')}</button>
        </div>
      </div>
    </div>`;
}

// ─── ADD / EDIT MODAL ─────────────────────────────────────────────────────────
function openAddModal() { openEditModal(null); }
function openEditModal(id) {
  const u = id ? units.find(x=>x.id===id) : null;
  const d = u || {id:0,name:'',type:'apartment',project:'',area:'',status:'available',
    purchasePrice:'',currentValue:'',hasInstall:false,installAmt:'',installPeriod:'monthly',
    totalInstalls:'',paidInstalls:'0',nextInstall:'',lateFee:'',rentAmt:'',rentPeriod:'monthly',
    tenantName:'',tenantPhone:'',rentStart:'',nextCollection:'',secDeposit:'',rentDeposit:'',notes:''};

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h2>${u?t('editUnit'):t('addUnit')}</h2>
          <button class="icon-btn" onclick="closeModal()" style="width:32px;height:32px"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
          <div class="field-row">
            <div class="field-group"><label>${t('unitName')}</label><input id="f-name" type="text" value="${d.name}"></div>
            <div class="field-group"><label>${t('type')}</label>
              <select id="f-type">
                <option value="apartment"${d.type==='apartment'?' selected':''}>${t('apartment')}</option>
                <option value="villa"${d.type==='villa'?' selected':''}>${t('villa')}</option>
                <option value="studio"${d.type==='studio'?' selected':''}>${t('studio')}</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field-group"><label>${t('project')}</label><input id="f-project" type="text" value="${d.project}"></div>
            <div class="field-group"><label>${t('area')} (m²)</label><input id="f-area" type="number" value="${d.area}"></div>
          </div>
          <div class="field-group"><label>${t('status')}</label>
            <select id="f-status" onchange="toggleRentSection()">
              <option value="available"${d.status==='available'?' selected':''}>${t('available')}</option>
              <option value="rented"${d.status==='rented'?' selected':''}>${t('rented')}</option>
              <option value="resale"${d.status==='resale'?' selected':''}>${t('resale')}</option>
            </select>
          </div>
          <div class="field-row">
            <div class="field-group"><label>${t('purchasePrice')} (EGP)</label><input id="f-purchase" type="number" value="${d.purchasePrice}"></div>
            <div class="field-group"><label>${t('currentValue')} (EGP)</label><input id="f-value" type="number" value="${d.currentValue}"></div>
          </div>

          <div class="section-divider">${t('installments')}</div>
          <div class="field-group">
            <label class="checkbox-label"><input type="checkbox" id="f-hasinstall"${d.hasInstall?' checked':''} onchange="toggleInstallSection()"> ${t('hasInstall')}</label>
          </div>
          <div id="install-fields" style="display:${d.hasInstall?'block':'none'}">
            <div class="field-row">
              <div class="field-group"><label>${t('installAmt')} (EGP)</label><input id="f-installamt" type="number" value="${d.installAmt}"></div>
              <div class="field-group"><label>${t('installPeriod')}</label>
                <select id="f-installperiod">
                  <option value="monthly"${d.installPeriod==='monthly'?' selected':''}>${t('monthly')}</option>
                  <option value="quarterly"${d.installPeriod==='quarterly'?' selected':''}>${t('quarterly')}</option>
                  <option value="biannual"${d.installPeriod==='biannual'?' selected':''}>${t('biannual')}</option>
                  <option value="annual"${d.installPeriod==='annual'?' selected':''}>${t('annual')}</option>
                </select>
              </div>
            </div>
            <div class="field-row">
              <div class="field-group"><label>${t('totalInstalls')}</label><input id="f-totalinstalls" type="number" value="${d.totalInstalls}"></div>
              <div class="field-group"><label>${t('paidInstalls')}</label><input id="f-paidinstalls" type="number" value="${d.paidInstalls}"></div>
            </div>
            <div class="field-row">
              <div class="field-group"><label>${t('nextInstall')}</label><input id="f-nextinstall" type="date" value="${d.nextInstall}"></div>
              <div class="field-group"><label>${t('lateFee')} %</label><input id="f-latefee" type="number" step="0.1" value="${d.lateFee}"></div>
            </div>
          </div>

          <div id="rent-fields" style="display:${d.status==='rented'?'block':'none'}">
            <div class="section-divider">${t('rentDetails')}</div>
            <div class="field-row">
              <div class="field-group"><label>${t('rentAmt')} (EGP)</label><input id="f-rentamt" type="number" value="${d.rentAmt}"></div>
              <div class="field-group"><label>${t('rentPeriod')}</label>
                <select id="f-rentperiod">
                  <option value="monthly"${d.rentPeriod==='monthly'?' selected':''}>${t('monthly')}</option>
                  <option value="quarterly"${d.rentPeriod==='quarterly'?' selected':''}>${t('quarterly')}</option>
                  <option value="biannual"${d.rentPeriod==='biannual'?' selected':''}>${t('biannual')}</option>
                  <option value="annual"${d.rentPeriod==='annual'?' selected':''}>${t('annual')}</option>
                </select>
              </div>
            </div>
            <div class="field-row">
              <div class="field-group"><label>${t('tenantName')}</label><input id="f-tenantname" type="text" value="${d.tenantName}"></div>
              <div class="field-group"><label>${t('tenantPhone')}</label><input id="f-tenantphone" type="text" value="${d.tenantPhone}"></div>
            </div>
            <div class="field-row">
              <div class="field-group"><label>${t('rentStart')}</label><input id="f-rentstart" type="date" value="${d.rentStart}"></div>
              <div class="field-group"><label>${t('nextCollection')}</label><input id="f-nextcollection" type="date" value="${d.nextCollection}"></div>
            </div>
            <div class="field-row">
              <div class="field-group"><label>${t('secDeposit')} (EGP)</label><input id="f-secdeposit" type="number" value="${d.secDeposit}"></div>
              <div class="field-group"><label>${t('rentDeposit')} (months)</label><input id="f-rentdeposit" type="number" value="${d.rentDeposit}"></div>
            </div>
          </div>

          <div class="section-divider">Notes</div>
          <div class="field-group"><label>${t('notes')}</label><textarea id="f-notes">${d.notes||''}</textarea></div>
        </div>
        <div class="modal-foot">
          <button class="btn" onclick="closeModal()">${t('cancel')}</button>
          <button class="btn btn-primary" onclick="saveUnit(${d.id})">${t('save')}</button>
        </div>
      </div>
    </div>`;
}

function toggleInstallSection() {
  const el = document.getElementById('install-fields');
  if(el) el.style.display = document.getElementById('f-hasinstall').checked?'block':'none';
}
function toggleRentSection() {
  const el = document.getElementById('rent-fields');
  if(el) el.style.display = document.getElementById('f-status').value==='rented'?'block':'none';
}

function g(id) { return document.getElementById(id); }

function saveUnit(id) {
  if(!g('f-name').value.trim()) { alert('Please enter a unit name'); return; }
  const isNew = !id || !units.find(u=>u.id===id);
  const unit = {
    id: id || Date.now(),
    name: g('f-name').value.trim(),
    type: g('f-type').value,
    project: g('f-project').value.trim(),
    area: +g('f-area').value||0,
    status: g('f-status').value,
    purchasePrice: +g('f-purchase').value||0,
    currentValue: +g('f-value').value||0,
    hasInstall: g('f-hasinstall').checked,
    installAmt: +g('f-installamt')?.value||0,
    installPeriod: g('f-installperiod')?.value||'monthly',
    totalInstalls: +g('f-totalinstalls')?.value||0,
    paidInstalls: +g('f-paidinstalls')?.value||0,
    nextInstall: g('f-nextinstall')?.value||'',
    lateFee: +g('f-latefee')?.value||0,
    rentAmt: +g('f-rentamt')?.value||0,
    rentPeriod: g('f-rentperiod')?.value||'monthly',
    tenantName: g('f-tenantname')?.value||'',
    tenantPhone: g('f-tenantphone')?.value||'',
    rentStart: g('f-rentstart')?.value||'',
    nextCollection: g('f-nextcollection')?.value||'',
    secDeposit: +g('f-secdeposit')?.value||0,
    rentDeposit: +g('f-rentdeposit')?.value||0,
    notes: g('f-notes').value
  };
  if(isNew) units.push(unit);
  else { const i = units.findIndex(u=>u.id===id); if(i>-1) units[i]=unit; }
  saveUnits(units);
  closeModal();
  showToast(t('savedOk'));
  renderPage();
}

function deleteUnit(id) {
  if(!confirm(t('confirmDelete'))) return;
  units = units.filter(u=>u.id!==id);
  saveUnits(units);
  closeModal();
  showToast(t('deletedOk'));
  renderPage();
}

function markInstallPaid(id) {
  const u = units.find(x=>x.id===id); if(!u) return;
  u.paidInstalls = Math.min(u.paidInstalls+1, u.totalInstalls);
  u.nextInstall = advanceDate(u.nextInstall, u.installPeriod);
  saveUnits(units);
  closeModal();
  showToast(t('paidOk'));
  renderPage();
  setTimeout(()=>openUnitDetail(id),100);
}

function markRentPaid(id) {
  const u = units.find(x=>x.id===id); if(!u) return;
  u.nextCollection = advanceDate(u.nextCollection, u.rentPeriod);
  saveUnits(units);
  closeModal();
  showToast(t('paidOk'));
  renderPage();
  setTimeout(()=>openUnitDetail(id),100);
}

function delayInstall(id) {
  const u = units.find(x=>x.id===id); if(!u) return;
  const days = parseInt(prompt('Delay by how many days?','30')||'0');
  if(!days||isNaN(days)) return;
  const d = new Date(u.nextInstall);
  d.setDate(d.getDate()+days);
  u.nextInstall = d.toISOString().split('T')[0];
  saveUnits(units);
  closeModal();
  showToast('Payment delayed by '+days+' days');
  renderPage();
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  const savedTheme = localStorage.getItem('propman_theme');
  const savedLang = localStorage.getItem('propman_lang');
  if(savedTheme==='dark') { theme='dark'; document.documentElement.setAttribute('data-theme','dark'); document.getElementById('theme-icon').className='ti ti-sun'; }
  if(savedLang) { lang=savedLang; document.documentElement.setAttribute('lang',lang); document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr'); }
  renderAll();
})();
</script>
</body>
</html>
